<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Генератор случайных пользователей</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans" rel="stylesheet">
    <link rel="stylesheet" href="style.css" type="text/css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
    <body>
        <div id="back-container">
            <a class="back-to-main" href="../../index.html">Назад</a>
        </div>
        <div class="container">
            <div class="row game-card align-items-center">
                <div class="col col-md-6 offset-md-3">
                    <div class="card text-center" id="personCard">
                        <div class="card-header">
                            <p class="m-0">Окно результатов генерации</p>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col">
                                    <img src="image/kid/child/person1.jpeg" id="photoOutput"/>
                                </div>
                                <div class="col" id="textPerson">
                                    <h3 class="card-title">Фамилия: <span id="surnameOutput">Генерация фамилии</span></h3>
                                    <h4>Имя: <span id="firstNameOutput">Генерация имени</span></h4>
                                    <h4>Отчество: <span id="patronymicOutput">Генерация отчества</span></h4>
                                    <p>
                                        <span id="genderOutput">Генерация пола</span>,
                                        <span id="birthYearOutput">Генерация</span> года рождения
                                    </p>
                                    <p>
                                        <span id="ageOutput">Генерация возраста</span>
                                    </p>
                                    <p>
                                        Профессия: <span id="JobOutput">Генерация профессии</span>
                                    </p>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col">
                                    <button type="button" id="generateButton" class="btn btn-secondary mt-3" >Сгенерировать</button>
                                </div>
                                <div class="col">
                                    <button type="button" id="resetButton" class="btn btn-secondary mt-3">Сброс</button>
                                </div>    
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="personGenerator.js"></script>
        <script src="init.js"></script>
    </body>
</html>
